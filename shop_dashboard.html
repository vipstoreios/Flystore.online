<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>داشبۆردی کڕین</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#0b0f19; color:white; font-family:sans-serif;">
    <div style="background:#161d2f; padding:15px; display:flex; justify-content:space-between; border-bottom:2px solid #38bdf8;">
        <div id="welcomeMsg">بەخێربێیت</div>
        <div id="userBalance" style="background:#38bdf8; color:black; padding:5px 15px; border-radius:10px; font-weight:bold;">باڵانس: 0 دینار</div>
    </div>

    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px; padding:20px;">
        <div style="background:#161d2f; padding:20px; border-radius:15px; text-align:center; border:1px solid #334155;">
            <h3>کۆدی فڵای ستۆر (یەکسەر)</h3>
            <div style="color:#38bdf8; font-size:1.5rem; font-weight:bold; margin:10px 0;">9,750 IQD</div>
            <button onclick="buyCode('Fly_Instant', 9750)" style="width:100%; padding:10px; background:#38bdf8; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">کڕین</button>
        </div>
    </div>

    <script>
        // وەرگرتنی ناوی ئەو یوزەرەی کە داخل بووە
        const currentUser = localStorage.getItem("currentUser") || "shop1";
        let balance = parseInt(localStorage.getItem("db_user_" + currentUser)) || 0;

        document.getElementById('welcomeMsg').innerText = "بەخێربێیت: " + currentUser;
        document.getElementById('userBalance').innerText = "باڵانس: " + balance.toLocaleString() + " دینار";

        function buyCode(name, price) {
            if (balance < price) {
                alert("باڵانست تەواو نییە! پەیوەندی بە ئەدمین بکە.");
                return;
            }

            if(confirm("ئایا دڵنیایت لە کڕین؟")) {
                balance -= price;
                // نوێکردنەوەی باڵانس لە میمۆری وێبگەڕ
                localStorage.setItem("db_user_" + currentUser, balance);
                document.getElementById('userBalance').innerText = "باڵانس: " + balance.toLocaleString() + " دینار";
                
                let code = "FL-" + Math.floor(1000 + Math.random() * 9000) + "-FREE";
                alert("کڕین سەرکەوتوو بوو!\nکۆدی تۆ: " + code);
            }
        }
    </script>
</body>
</html>
