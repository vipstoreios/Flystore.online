<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>داشبۆردی بریکار | FLY MARKET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .header-bar { background: #161d2f; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #38bdf8; }
        .balance-box { background: #0ea5e9; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px 5%; }
        .product-card { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; text-align: center; }
        .btn-buy { background: #38bdf8; color: black; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body style="background: #0b0f19; color: white; margin: 0;">

<div class="header-bar">
    <div style="font-size: 1.5rem; font-weight: bold;">FLY MARKET</div>
    <div class="balance-box">باڵانسی تۆ: 150.00$</div>
</div>

<div class="grid-container">
    <div class="product-card">
        <h3>PUBG 660 UC</h3>
        <p style="color: #38bdf8; font-size: 1.2rem;">8.50$</p>
        <button class="btn-buy" onclick="buy()">کڕینی خێرا</button>
    </div>

    <div class="product-card">
        <h3>NetFlix 1 Month</h3>
        <p style="color: #38bdf8; font-size: 1.2rem;">5.00$</p>
        <button class="btn-buy" onclick="buy()">کڕینی خێرا</button>
    </div>
</div>

<script>
    function buy() {
        if(confirm("ئایا دڵنیایت لە کڕینی ئەم بەرهەمە؟ بڕی پارەکە لە باڵانست دەبڕدرێت.")) {
            alert("کڕین سەرکەوتوو بوو! کۆدەکە بۆ تێلێگرامت نێردرا.");
        }
    }
</script>

</body>
</html>
