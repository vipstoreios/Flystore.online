<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly Market | Shop</title>
    <style>
        :root { --bg: #050810; --card: #111827; --accent: #0ea5e9; --danger: #ef4444; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin:0; padding-bottom: 30px; }
        
        /* دیزاینی ناڤبار و دوگمەی چوونەدەرەوە */
        .nav { background: var(--card); padding: 12px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #1f2937; align-items: center; position: sticky; top: 0; z-index: 100; }
        .user-info { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .logout-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; }
        .logout-btn:hover { background: var(--danger); color: white; }

        .alert-box { background: rgba(14, 165, 233, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 12px; margin: 15px; border-radius: 10px; font-size: 14px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .p-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #1f2937; text-align: center; }
        .btn-buy { background: var(--accent); border:none; padding:10px; border-radius:8px; width:100%; font-weight:bold; margin-top:10px; color:black; cursor: pointer; }
        
        table { width: 95%; margin: 10px auto; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; border-bottom: 1px solid #1f2937; text-align: right; }
        .price-tag { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-weight:bold; color:var(--accent); font-size: 18px;">FLY MARKET</div>
    <div class="user-info">
        <div id="userSide">...</div>
        <button class="logout-btn" onclick="logout()">چوونەدەرەوە</button>
    </div>
</div>

<div id="admin_alert" class="alert-box" style="display:none;"></div>

<div class="grid" id="prods"></div>

<div style="padding: 15px;">
    <h3 style="border-right: 4px solid var(--accent); padding-right: 10px;">📦 مێژووی کڕینەکانت</h3>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>ناوی کاڵا</th>
                    <th>کۆدی کڕدراو</th>
                    <th>بەروار و کات</th>
                </tr>
            </thead>
            <tbody id="myLogs"></tbody>
        </table>
    </div>
</div>

<script>
    // پشکنینی چوونەژوورەوە
    const user = localStorage.getItem('session');
    if(!user) {
        window.location.href = "index.html";
    }

    // فەنکشنی چوونەدەرەوە
    function logout() {
        if(confirm("ئایا دڵنیایت لە چوونەدەرەوە؟")) {
            localStorage.removeItem('session'); // سڕینەوەی کاتی چوونەژوورەوە
            window.location.href = "index.html"; // گەڕانەوە بۆ لاپەڕەی لۆگین
        }
    }

    function init() {
        let userData = localStorage.getItem(`acc_${user}`);
        if(!userData) {
            logout(); // ئەگەر یوزەرەکە لە ئەدمین سڕابووەوە، دەری بکە
            return;
        }
        
        let d = JSON.parse(userData);
        document.getElementById('userSide').innerHTML = `بریکار: <b>${user}</b><br><span class="price-tag">${d.bal.toLocaleString()} IQD</span>`;
        
        // پشکنینی ئاگادارییەکان
        let msg = localStorage.getItem('fly_alert');
        if(msg) {
            let el = document.getElementById('admin_alert');
            el.innerText = "📢 " + msg;
            el.style.display = "block";
        }

        renderProds();
        renderMyLogs();
    }

    function renderProds() {
        let prods = JSON.parse(localStorage.getItem('prods') || "[]");
        let html = prods.map(p => {
            let stk = JSON.parse(localStorage.getItem(`stk_${p.id}`) || "[]");
            let isOut = stk.length === 0;
            return `
                <div class="p-card" style="${isOut ? 'opacity: 0.7' : ''}">
                    <h4 style="margin: 5px 0;">${p.n}</h4>
                    <h3 class="price-tag">${p.p.toLocaleString()}</h3>
                    <p style="font-size: 12px; color: #94a3b8;">ماوە: ${stk.length}</p>
                    <button class="btn-buy" 
                            onclick="buy('${p.id}','${p.n}',${p.p})" 
                            ${isOut ? 'disabled style="background:#374151; color:#94a3b8;"' : ''}>
                        ${isOut ? 'تەواو بووە' : 'کڕین'}
                    </button>
                </div>`;
        }).join('');
        document.getElementById('prods').innerHTML = html || "<p style='text-align:center; grid-column: 1/-1;'>هیچ بەرهەمێک بەردەست نییە</p>";
    }

    function buy(id, n, price) {
        let d = JSON.parse(localStorage.getItem(`acc_${user}`));
        let stk = JSON.parse(localStorage.getItem(`stk_${id}`));
        
        if(d.bal < price) {
            alert("باڵانسی پێویستت نییە!");
            return;
        }

        if(confirm(`ئایا دڵنیایت لە کڕینی ${n}؟`)) {
            let code = stk.shift();
            d.bal -= price;
            
            localStorage.setItem(`acc_${user}`, JSON.stringify(d));
            localStorage.setItem(`stk_${id}`, JSON.stringify(stk));
            
            let logs = JSON.parse(localStorage.getItem('logs') || "[]");
            logs.push({
                u: user, 
                p: n, 
                c: code, 
                d: new Date().toLocaleString(), 
                price: price
            });
            localStorage.setItem('logs', JSON.stringify(logs));
            
            alert("پیرۆزە! کۆدەکەت: " + code);
            location.reload();
        }
    }

    function renderMyLogs() {
        let logs = JSON.parse(localStorage.getItem('logs') || "[]");
        let my = logs.filter(l => l.u === user).reverse();
        document.getElementById('myLogs').innerHTML = my.map(m => `
            <tr>
                <td>${m.p}</td>
                <td style="color:var(--accent); font-family: monospace; font-weight: bold;">${m.c}</td>
                <td style="font-size: 11px; color: #94a3b8;">${m.d}</td>
            </tr>
        `).join('') || "<tr><td colspan='3' style='text-align:center;'>هیچ کڕینێک نەکراوە</td></tr>";
    }

    init();
</script>
</body>
</html>
