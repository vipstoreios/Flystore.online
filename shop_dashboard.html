<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Fly Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header-bar">
        <div class="logo-small">FLY MARKET</div>
        <div class="balance-box" id="displayBalance">باڵانس: 0 دینار</div>
    </header>

    <div class="grid-container">
        <div class="product-card">
            <span class="badge">٢ مانگ گەرەنتی</span>
            <h3>کۆدی فڵای ستۆر (یەکسەر)</h3>
            <div class="price">9,750 IQD</div>
            <button class="btn-buy" onclick="processPurchase('FlyStore_Instant', 9750)">کڕین و وەرگرتنی کۆد</button>
        </div>

        <div class="product-card">
            <span class="badge yellow">١ مانگ گەرەنتی</span>
            <h3>کۆدی فڵای ستۆر (٣ ڕۆژ)</h3>
            <div class="price">7,500 IQD</div>
            <button class="btn-buy" onclick="processPurchase('FlyStore_3Day', 7500)">کڕین و وەرگرتنی کۆد</button>
        </div>
    </div>

    <section class="orders-section">
        <h3>📦 مێژووی کڕینەکانت</h3>
        <table>
            <thead>
                <tr>
                    <th>بەرهەم</th>
                    <th>کۆد</th>
                    <th>نرخ</th>
                </tr>
            </thead>
            <tbody id="orderHistory"></tbody>
        </table>
    </section>

    <script>
        let balance = parseInt(localStorage.getItem("balance")) || 100000; // ئەمە لە فایەربەیسەوە دێت
        document.getElementById('displayBalance').innerText = `باڵانس: ${balance.toLocaleString()} دینار`;

        function processPurchase(prodName, price) {
            if (balance < price) {
                alert("باڵانست تەواو نییە!");
                return;
            }

            if (confirm(`ئایا دڵنیایت لە کڕینی ${prodName}؟`)) {
                balance -= price;
                localStorage.setItem("balance", balance);
                document.getElementById('displayBalance').innerText = `باڵانس: ${balance.toLocaleString()} دینار`;
                
                const generatedCode = "FL-" + Math.random().toString(36).substr(2, 9).toUpperCase();
                addOrderToTable(prodName, generatedCode, price);
                alert("کۆدەکەت: " + generatedCode);
            }
        }

        function addOrderToTable(name, code, price) {
            const row = `<tr><td>${name}</td><td class="code-text">${code}</td><td>${price} IQD</td></tr>`;
            document.getElementById('orderHistory').innerHTML = row + document.getElementById('orderHistory').innerHTML;
        }
    </script>
</body>
</html>
