<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly Market | Dashboard</title>
    <style>
        :root { --bg: #050810; --card: #111827; --accent: #0ea5e9; --danger: #ef4444; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin:0; padding-bottom: 50px; }
        .nav { background: var(--card); padding: 12px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #1f2937; align-items: center; position: sticky; top:0; z-index:100; }
        .logout { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .alert-box { background: rgba(14, 165, 233, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 15px; margin: 15px; border-radius: 12px; text-align: center; border-right: 5px solid var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .p-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #1f2937; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-buy { background: var(--accent); border:none; padding:12px; border-radius:10px; width:100%; font-weight:bold; margin-top:10px; color:black; cursor: pointer; }
        table { width: 95%; margin: 10px auto; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; border-bottom: 1px solid #1f2937; text-align: right; }
        .price { color: var(--accent); font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
<div class="nav">
    <div style="font-weight:bold; color:var(--accent); font-size: 20px;">FLY MARKET</div>
    <div style="display:flex; align-items:center; gap:10px;">
        <div id="userSide" style="font-size:12px; text-align:left; line-height: 1.4;"></div>
        <button class="logout" onclick="logout()">دەرچوون</button>
    </div>
</div>

<div id="admin_alert" class="alert-box" style="display:none;"></div>

<div class="grid" id="prods"></div>

<div style="padding: 20px;">
    <h3 style="border-right: 4px solid var(--accent); padding-right: 10px;">📦 مێژووی کڕینەکانت</h3>
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>بەرهەم</th><th>کۆدی کڕدراو</th><th>بەروار</th></tr></thead>
            <tbody id="myLogs"></tbody>
        </table>
    </div>
</div>

<script>
    const userSession = localStorage.getItem('session');
    if(!userSession) window.location.href="index.html";

    function logout() { 
        if(confirm("ئایا دڵنیایت لە دەرچوون؟")) {
            localStorage.removeItem('session'); 
            window.location.href="index.html"; 
        }
    }

    function init() {
        let userData = localStorage.getItem(`acc_${userSession}`);
        if(!userData) {
            localStorage.removeItem('session');
            window.location.href="index.html";
            return;
        }
        
        let d = JSON.parse(userData);
        document.getElementById('userSide').innerHTML = `بریکار: <b>${userSession}</b><br><span style="color:var(--accent)">${d.bal.toLocaleString()} IQD</span>`;
        
        let msg = localStorage.getItem('fly_alert');
        if(msg) { 
            let el = document.getElementById('admin_alert'); 
            el.innerText = "📢 " + msg; 
            el.style.display = "block"; 
        }
        
        renderProds(); 
        renderMyLogs();
    }

    function renderProds() {
        let prods = JSON.parse(localStorage.getItem('prods') || "[]");
        document.getElementById('prods').innerHTML = prods.map(p => {
            let stk = JSON.parse(localStorage.getItem(`stk_${p.id}`) || "[]");
            let isOut = stk.length === 0;
            return `
                <div class="p-card">
                    <h4 style="margin:5px 0;">${p.n}</h4>
                    <div class="price">${p.p.toLocaleString()}</div>
                    <p style="color:#94a3b8; font-size:12px;">مەوجود: ${stk.length}</p>
                    <button class="btn-buy" onclick="buy('${p.id}','${p.n}',${p.p})" 
                    ${isOut ? 'disabled style="background:#374151; color:#94a3b8;"' : ''}>
                    ${isOut ? 'تەواو بووە' : 'کڕین'}
                    </button>
                </div>`;
        }).join('') || "<p style='grid-column:1/-1; text-align:center;'>هیچ بەرهەمێک نییە</p>";
    }

    function buy(id, n, price) {
        let d = JSON.parse(localStorage.getItem(`acc_${userSession}`));
        let stk = JSON.parse(localStorage.getItem(`stk_${id}`));
        
        if(d.bal < price) return alert("باڵانست بەش ناکات!");
        
        if(confirm(`کڕینی ${n} بە بڕی ${price}؟`)) {
            let code = stk.shift(); 
            d.bal -= price;
            
            localStorage.setItem(`acc_${userSession}`, JSON.stringify(d));
            localStorage.setItem(`stk_${id}`, JSON.stringify(stk));
            
            let logs = JSON.parse(localStorage.getItem('logs') || "[]");
            logs.push({u:userSession, p:n, c:code, d:new Date().toLocaleString(), price: price});
            localStorage.setItem('logs', JSON.stringify(logs));
            
            alert("سەرکەوتوو بوو! کۆدەکە: " + code); 
            location.reload();
        }
    }

    function renderMyLogs() {
        let logs = JSON.parse(localStorage.getItem('logs') || "[]");
        let my = logs.filter(l => l.u === userSession).reverse();
        document.getElementById('myLogs').innerHTML = my.map(m => `
            <tr>
                <td>${m.p}</td>
                <td style="color:var(--accent); font-weight:bold;">${m.c}</td>
                <td style="font-size:11px; color:#94a3b8;">${m.d}</td>
            </tr>
        `).join('') || "<tr><td colspan='3' style='text-align:center;'>هیچ کڕینێک نەکراوە</td></tr>";
    }
    init();
</script>
</body>
</html>
