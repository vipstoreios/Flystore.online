<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fly Market | Login</title>
    <style>
        body { background: #050810; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .box { background: #111827; padding: 40px; border-radius: 25px; border: 1px solid #1f2937; width: 350px; text-align: center; }
        input { background: #050810; border: 1px solid #1f2937; color: white; padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 15px; }
        .btn { background: #0ea5e9; color: black; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .err { color: #ef4444; font-size: 0.8rem; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
<div class="box">
    <h1 style="color:#0ea5e9">FLY MARKET</h1>
    <div id="msg" class="err">Username or Password Wrong!</div>
    <input type="text" id="user" placeholder="ناوی بەکارهێنەر">
    <input type="password" id="pass" placeholder="وشەی نهێنی">
    <button class="btn" onclick="login()">چوونەژوورەوە</button>
</div>
<script>
    function login() {
        let u = document.getElementById('user').value;
        let p = document.getElementById('pass').value;
        let data = localStorage.getItem(`acc_${u}`);
        if(data) {
            let d = JSON.parse(data);
            if(d.pass === p) {
                localStorage.setItem('session', u);
                window.location.href = "shop_dashboard.html";
            } else { document.getElementById('msg').style.display='block'; }
        } else { document.getElementById('msg').style.display='block'; }
    }
</script>
</body>
</html>
