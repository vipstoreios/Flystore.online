<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly Market | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="logo">FLY MARKET</div>
        <p style="color: #94a3b8; margin-bottom: 20px;">تایبەت بە بریکاران</p>
        <input type="text" id="username" placeholder="ناوی بەکارهێنەر">
        <input type="password" id="password" placeholder="وشەی نهێنی">
        <button class="btn-login" onclick="attemptLogin()">چوونەژوورەوە</button>
        <div id="loginError" style="color: #ef4444; margin-top: 10px; display: none;">زانیارییەکان هەڵەیە!</div>
    </div>

    <script>
        function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // لێرەدا دەبێت لەگەڵ فایەربەیس بەراورد بکرێت، بۆ ئێستا ئەمە جدییە:
            if(user && pass) {
                localStorage.setItem("currentUser", user);
                window.location.href = "shop_dashboard.html";
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
    </script>
</body>
</html>
