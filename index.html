<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLY MARKET | P2P Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">FLY MARKET</div>
    <nav>
        <a href="#" class="nav-link">چوونەژوورەوە</a>
        <a href="#" class="btn-primary">تۆمارکردن</a>
    </nav>
</header>

<section class="hero">
    <h1>گەورەترین بازاڕی P2P بۆ کۆدی هاک</h1>
    <p>کۆدەکانی خۆت بفرۆشە یان بە گەرەنتییەکی تەواوەوە بکڕە.</p>
    <div class="payments">
        <span>FastPay</span> | <span>FIB</span> | <span>ZainCash</span> | <span>USDT</span>
    </div>
</section>

<section class="product-section">
    <div class="section-header">
        <h2>لیستی کۆدە بەردەستەکان</h2>
        <input type="text" id="searchInput" placeholder="گەڕان بۆ کۆد...">
    </div>
    
    <div class="product-list" id="productList">
        </div>
</section>

<script src="script.js"></script>
</body>
</html>
