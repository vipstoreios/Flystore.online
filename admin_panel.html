<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly Store | پانێڵی بەڕێوەبەری سەرەکی</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --danger: #f43f5e;
            --success: #10b981;
            --text: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
        }

        /* Sidebar Sidebar */
        .sidebar {
            width: 250px;
            background: var(--card);
            height: 100vh;
            position: fixed;
            border-left: 1px solid #334155;
            padding: 20px;
        }

        .main-content {
            margin-right: 290px;
            padding: 30px;
            width: 100%;
        }

        .admin-card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #334155;
            margin-bottom: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h2 { color: var(--accent); font-size: 1.3rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        input, select, textarea {
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-success { background: var(--success); color: white; width: 100%; }
        .btn-danger { background: var(--danger); color: white; padding: 5px 10px; font-size: 0.8rem; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #334155; }
        th { background: #1e293b; color: #94a3b8; }

        .badge { padding: 4px 8px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1 style="color: var(--accent); font-size: 1.5rem;">FLY ADMIN</h1>
    <hr style="border: 0.5px solid #334155;">
    <p>بەڕێوەبەری سیستەم</p>
</div>

<div class="main-content">
    
    <div class="admin-card">
        <h2>👤 زیادکردنی بریکاری نوێ</h2>
        <div class="input-grid">
            <input type="text" id="new_user" placeholder="ناوی بەکارهێنەر">
            <input type="password" id="new_pass" placeholder="وشەی نهێنی">
            <input type="number" id="new_bal" placeholder="باڵانسی سەرەتایی">
        </div>
        <button class="btn btn-success" onclick="createAccount()">+ دروستکردنی ئەکاونت</button>
        
        <table id="userTable">
            <thead>
                <tr>
                    <th>ناو</th>
                    <th>پاسورد</th>
                    <th>باڵانس</th>
                    <th>کردار</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="admin-card">
        <h2>🛍️ زیادکردنی بەرهەمی نوێ (کاڵا)</h2>
        <div class="input-grid">
            <input type="text" id="p_name" placeholder="ناوی بەرهەم (بۆ نموونە: Fly Store 2Month)">
            <input type="number" id="p_price" placeholder="نرخ بە دینار">
            <input type="text" id="p_guarantee" placeholder="گەرەنتی">
        </div>
        <button class="btn btn-primary" onclick="addNewProduct()">+ زیادکردنی بەرهەم بۆ لیست</button>
    </div>

    <div class="admin-card">
        <h2>🔑 بارکردنی کۆدەکان بۆ فرۆشتن</h2>
        <select id="select_product" style="width: 100%; margin-bottom: 10px;"></select>
        <textarea id="bulk_codes" style="width: 100%; height: 100px;" placeholder="کۆدەکان لێرە دابنێ (هەر کۆدێک لە دێڕێک)"></textarea>
        <button class="btn btn-primary" style="width: 100%;" onclick="uploadCodes()">بارکردنی کۆدەکان</button>
    </div>

    <div class="admin-card">
        <h2>📊 مێژووی هەموو فرۆشتنەکان</h2>
        <table id="globalLogs">
            <thead>
                <tr>
                    <th>بریکار</th>
                    <th>بەرهەم</th>
                    <th>کۆد</th>
                    <th>کاتی کڕین</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>
    // --- دەستپێکردن و بارکردنی داتاکان ---
    window.onload = function() {
        refreshAll();
    };

    function refreshAll() {
        loadUsers();
        loadProductSelect();
        loadGlobalLogs();
    }

    // --- دروستکردنی ئەکاونت ---
    function createAccount() {
        const u = document.getElementById('new_user').value;
        const p = document.getElementById('new_pass').value;
        const b = document.getElementById('new_bal').value;

        if(!u || !p || !b) return alert("هەموو زانیارییەکان پڕ بکەرەوە");

        const userData = { password: p, balance: parseInt(b) };
        localStorage.setItem(`account_${u}`, JSON.stringify(userData));
        alert("ئەکاونت دروستکرا");
        refreshAll();
    }

    function loadUsers() {
        const tbody = document.querySelector("#userTable tbody");
        tbody.innerHTML = "";
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key.startsWith("account_")) {
                let name = key.replace("account_", "");
                let data = JSON.parse(localStorage.getItem(key));
                tbody.innerHTML += `<tr>
                    <td>${name}</td>
                    <td>${data.password}</td>
                    <td>${data.balance.toLocaleString()} IQD</td>
                    <td><button class="btn-danger" onclick="deleteItem('${key}')">سڕینەوە</button></td>
                </tr>`;
            }
        }
    }

    // --- زیادکردنی بەرهەمی نوێ ---
    function addNewProduct() {
        const name = document.getElementById('p_name').value;
        const price = document.getElementById('p_price').value;
        const guar = document.getElementById('p_guarantee').value;

        if(!name || !price) return alert("ناوی بەرهەم و نرخ بنووسە");

        let products = JSON.parse(localStorage.getItem("store_products") || "[]");
        products.push({ id: Date.now(), name, price: parseInt(price), guarantee: guar });
        localStorage.setItem("store_products", JSON.stringify(products));
        alert("بەرهەم زیادکرا");
        refreshAll();
    }

    function loadProductSelect() {
        const select = document.getElementById('select_product');
        const products = JSON.parse(localStorage.getItem("store_products") || "[]");
        select.innerHTML = products.map(p => `<option value="${p.id}">${p.name} (${p.price} IQD)</option>`).join('');
    }

    // --- بارکردنی کۆدەکان ---
    function uploadCodes() {
        const pId = document.getElementById('select_product').value;
        const raw = document.getElementById('bulk_codes').value.trim();
        if(!raw) return alert("کۆدەکان بنووسە");

        let newCodes = raw.split('\n').filter(c => c.trim() !== "");
        let stockKey = `stock_${pId}`;
        let currentStock = JSON.parse(localStorage.getItem(stockKey) || "[]");
        
        localStorage.setItem(stockKey, JSON.stringify([...currentStock, ...newCodes]));
        alert(`${newCodes.length} کۆد بارکرا`);
        document.getElementById('bulk_codes').value = "";
    }

    // --- بینینی مامەڵەکان ---
    function loadGlobalLogs() {
        const logs = JSON.parse(localStorage.getItem("global_sales") || "[]");
        const tbody = document.querySelector("#globalLogs tbody");
        tbody.innerHTML = logs.reverse().map(l => `
            <tr>
                <td>${l.user}</td>
                <td>${l.productName}</td>
                <td style="color:var(--accent); font-family:monospace;">${l.code}</td>
                <td>${l.date}</td>
            </tr>
        `).join('');
    }

    function deleteItem(key) {
        if(confirm("دڵنیایت لە سڕینەوە؟")) {
            localStorage.removeItem(key);
            refreshAll();
        }
    }
</script>

</body>
</html>
