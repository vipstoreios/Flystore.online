<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fly Store Admin | دەسەڵاتی تەواو</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ستایل بۆ خشتەی بەرهەمەکان */
        .product-list-item {
            background: #0f172a;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }
        .stock-count {
            background: #38bdf8;
            color: #000;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="main-content" style="margin: auto; max-width: 900px; padding: 20px;">
    
    <div class="admin-card">
        <h2>🛍️ بەڕێوەبردنی بەرهەمەکان</h2>
        <div class="input-grid">
            <input type="text" id="p_name" placeholder="ناوی بەرهەم">
            <input type="number" id="p_price" placeholder="نرخ">
            <input type="text" id="p_guar" placeholder="گەرەنتی">
        </div>
        <button class="btn btn-primary" onclick="addNewProduct()" style="margin-top:10px;">+ زیادکردنی بەرهەمی نوێ</button>
        
        <div id="productListDisplay" style="margin-top: 20px;">
            </div>
    </div>

    <div class="admin-card">
        <h2>🔑 زیادکردنی کۆد بۆ کۆگا</h2>
        <p style="font-size: 0.8rem; color: #94a3b8;">بەرهەمەکە هەڵبژێرە و کۆدەکان لێرە دابنێ</p>
        <select id="select_product"></select>
        <textarea id="bulk_codes" style="height: 100px; margin-top:10px;" placeholder="کۆدەکان لێرە دانێ (هەر دێڕێک و کۆدێک)"></textarea>
        <button class="btn btn-success" onclick="uploadCodes()" style="margin-top:10px;">بارکردنی کۆدەکان</button>
    </div>

</div>

<script>
    window.onload = function() { refreshAdmin(); };

    function refreshAdmin() {
        renderProductList(); // بۆ سڕینەوە
        loadProductSelect(); // بۆ هەڵبژاردنی کۆد
    }

    // زیادکردنی بەرهەمی نوێ
    function addNewProduct() {
        const name = document.getElementById('p_name').value;
        const price = document.getElementById('p_price').value;
        const guar = document.getElementById('p_guar').value;

        if(!name || !price) return alert("زانیارییەکان تەواو نین");

        let products = JSON.parse(localStorage.getItem("store_products") || "[]");
        const newProd = { id: "ID" + Date.now(), name, price: parseInt(price), guarantee: guar };
        products.push(newProd);
        
        localStorage.setItem("store_products", JSON.stringify(products));
        
        // دروستکردنی شوێنی کۆد بۆ ئەم بەرهەمە
        localStorage.setItem(`stock_${newProd.id}`, JSON.stringify([]));

        alert("بەرهەم زیادکرا");
        document.getElementById('p_name').value = "";
        refreshAdmin();
    }

    // نیشاندانی لیستی بەرهەمەکان بۆ سڕینەوە
    function renderProductList() {
        const products = JSON.parse(localStorage.getItem("store_products") || "[]");
        const display = document.getElementById('productListDisplay');
        display.innerHTML = "<h4>کاڵاکانی ئێستا:</h4>";

        products.forEach(p => {
            const stock = JSON.parse(localStorage.getItem(`stock_${p.id}`) || "[]");
            display.innerHTML += `
                <div class="product-list-item">
                    <span>${p.name} - <b>${p.price} IQD</b> <span class="stock-count">${stock.length} دانە</span></span>
                    <button class="btn-danger" onclick="deleteProduct('${p.id}')">سڕینەوە</button>
                </div>
            `;
        });
    }

    // سڕینەوەی بەرهەم
    function deleteProduct(id) {
        if(confirm("دڵنیایت لە سڕینەوەی ئەم بەرهەمە و کۆدەکانی؟")) {
            // سڕینەوە لە لیستی بەرهەمەکان
            let products = JSON.parse(localStorage.getItem("store_products") || "[]");
            products = products.filter(p => p.id !== id);
            localStorage.setItem("store_products", JSON.stringify(products));

            // سڕینەوەی کۆگای ئەم بەرهەمە
            localStorage.removeItem(`stock_${id}`);

            refreshAdmin();
        }
    }

    // پڕکردنەوەی مینیوی هەڵبژاردن بۆ کۆدەکان
    function loadProductSelect() {
        const select = document.getElementById('select_product');
        const products = JSON.parse(localStorage.getItem("store_products") || "[]");
        select.innerHTML = products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }

    // بارکردنی کۆدەکان بۆ ناو بەرهەمی هەڵبژێردراو
    function uploadCodes() {
        const pId = document.getElementById('select_product').value;
        const raw = document.getElementById('bulk_codes').value.trim();
        
        if(!pId) return alert("تکایە سەرەتا بەرهەمێک دروست بکە");
        if(!raw) return alert("کۆدەکان بنووسە");

        let newCodes = raw.split('\n').filter(c => c.trim() !== "");
        let currentStock = JSON.parse(localStorage.getItem(`stock_${pId}`) || "[]");
        
        localStorage.setItem(`stock_${pId}`, JSON.stringify([...currentStock, ...newCodes]));
        
        alert(`${newCodes.length} کۆد بە سەرکەوتوویی زیادکرا`);
        document.getElementById('bulk_codes').value = "";
        refreshAdmin();
    }
</script>

</body>
</html>
