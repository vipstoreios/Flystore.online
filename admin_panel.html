<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Admin Control | Fly Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="padding: 20px;">
        <h2>بەڕێوەبردنی بریکارەکان</h2>
        <div class="product-card" style="max-width: 500px; margin: auto;">
            <input type="text" id="targetUser" placeholder="ناوی بریکار (Username)">
            <input type="number" id="amountToAdd" placeholder="بڕی پارە بە دینار">
            <button class="btn-buy" style="background: #10b981;" onclick="updateBalance()">زیادکردنی باڵانس</button>
        </div>

        <h2 style="margin-top: 40px;">لیستی گشتی کڕینەکان</h2>
        <table id="adminLogs">
            <thead>
                <tr><th>بریکار</th><th>بەرهەم</th><th>بڕی پارە</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        function updateBalance() {
            const user = document.getElementById('targetUser').value;
            const amount = document.getElementById('amountToAdd').value;
            if(user && amount) {
                // لێرەدا فایەربەیس باڵانسی ئەو یوزەرە نوێ دەکاتەوە
                alert(`بڕی ${amount} دینار بۆ ${user} زیادکرا.`);
                localStorage.setItem("balance", amount); // بۆ تێست
            }
        }
    </script>
</body>
</html>
