<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fly Store Admin | کۆنترۆڵی جدی</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #f43f5e; --success: #10b981; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--card); height: 100vh; position: fixed; border-left: 1px solid #334155; padding: 20px; }
        .main-content { margin-right: 260px; padding: 30px; width: calc(100% - 260px); }
        .admin-card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 25px; }
        h2 { color: var(--accent); border-right: 4px solid var(--accent); padding-right: 10px; margin-bottom: 20px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        input, select, textarea { background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-add { background: var(--success); color: white; width: 100%; }
        .btn-danger { background: var(--danger); color: white; padding: 5px 10px; font-size: 0.8rem; }
        .stock-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: white; border: none;">FLY ADMIN</h2>
    <button class="btn" style="background: #334155; color: white; width: 100%;" onclick="location.reload()">تازەکردنەوە (Refresh)</button>
</div>

<div class="main-content">
    
    <div class="admin-card">
        <h2>🛍️ بەڕێوەبردنی بەرهەمەکان</h2>
        <div class="input-grid">
            <input type="text" id="p_name" placeholder="ناوی بەرهەم">
            <input type="number" id="p_price" placeholder="نرخ">
        </div>
        <button class="btn btn-add" onclick="addProduct()">+ دروستکردنی بەرهەم</button>
        <div id="productList" style="margin-top: 20px;"></div>
    </div>

    <div class="admin-card">
        <h2>🔑 زیادکردنی کۆد بۆ کۆگا</h2>
        <select id="p_select" onchange="showCurrentStock()"></select>
        <textarea id="bulk_codes" rows="3" style="margin-top: 10px;" placeholder="کۆدەکان لێرە دابنێ..."></textarea>
        <button class="btn btn-add" style="background: var(--accent); color: black;" onclick="uploadCodes()">بارکردنی کۆدەکان</button>
    </div>

    <div class="admin-card">
        <h2>📦 بەڕێوەبردنی کۆگای کۆدەکان</h2>
        <p style="font-size: 0.8rem; color: #94a3b8;">کۆدەکان لێرە دەردەکەون، دەتوانیت یەک یەک بیانسڕیتەوە:</p>
        <div id="stockListDisplay"></div>
    </div>

</div>

<script>
    window.onload = function() { refresh(); };

    function refresh() {
        renderProducts();
        loadSelect();
        showCurrentStock();
    }

    // --- بەرهەمەکان ---
    function addProduct() {
        const name = document.getElementById('p_name').value;
        const price = document.getElementById('p_price').value;
        if(!name || !price) return alert("زانیارییەکان تەواو نییە");

        let prods = JSON.parse(localStorage.getItem("store_products") || "[]");
        let id = "PROD_" + Date.now();
        prods.push({ id, name, price });
        localStorage.setItem("store_products", JSON.stringify(prods));
        localStorage.setItem(`stock_${id}`, JSON.stringify([])); // دروستکردنی کۆگای بەتاڵ
        
        document.getElementById('p_name').value = "";
        document.getElementById('p_price').value = "";
        refresh();
    }

    function renderProducts() {
        let prods = JSON.parse(localStorage.getItem("store_products") || "[]");
        let div = document.getElementById('productList');
        div.innerHTML = prods.map(p => `
            <div class="stock-item">
                <span><b>${p.name}</b> - ${p.price} IQD</span>
                <button class="btn-danger" onclick="deleteProduct('${p.id}')">سڕینەوەی بەرهەم</button>
            </div>
        `).join('');
    }

    function deleteProduct(id) {
        if(confirm("دڵنیایت؟ هەموو کۆدەکانی ئەم بەرهەمەش دەسڕێنەوە!")) {
            let prods = JSON.parse(localStorage.getItem("store_products") || "[]");
            prods = prods.filter(p => p.id !== id);
            localStorage.setItem("store_products", JSON.stringify(prods));
            localStorage.removeItem(`stock_${id}`);
            refresh();
        }
    }

    // --- کۆدەکان ---
    function loadSelect() {
        let prods = JSON.parse(localStorage.getItem("store_products") || "[]");
        let select = document.getElementById('p_select');
        select.innerHTML = prods.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }

    function uploadCodes() {
        let id = document.getElementById('p_select').value;
        let raw = document.getElementById('bulk_codes').value.trim();
        if(!id || !raw) return alert("بەرهەم هەڵبژێرە و کۆد بنووسە");

        let newCodes = raw.split('\n').filter(c => c.trim() !== "");
        let current = JSON.parse(localStorage.getItem(`stock_${id}`) || "[]");
        localStorage.setItem(`stock_${id}`, JSON.stringify([...current, ...newCodes]));
        
        document.getElementById('bulk_codes').value = "";
        alert("کۆدەکان زیادکران");
        refresh();
    }

    // --- پیشاندان و سڕینەوەی کۆدی دیاریکراو ---
    function showCurrentStock() {
        let id = document.getElementById('p_select').value;
        let display = document.getElementById('stockListDisplay');
        if(!id) { display.innerHTML = "هیچ بەرهەمێک نییە"; return; }

        let stock = JSON.parse(localStorage.getItem(`stock_${id}`) || "[]");
        if(stock.length === 0) { display.innerHTML = "ئەم بەرهەمە هیچ کۆدێکی تێدا نییە"; return; }

        display.innerHTML = stock.map((code, index) => `
            <div class="stock-item" style="border-right: 2px solid var(--accent);">
                <span>${code}</span>
                <button class="btn-danger" onclick="deleteSingleCode('${id}', ${index})">سڕینەوەی کۆد</button>
            </div>
        `).join('');
    }

    function deleteSingleCode(prodId, index) {
        let stock = JSON.parse(localStorage.getItem(`stock_${prodId}`) || "[]");
        stock.splice(index, 1); // سڕینەوەی ئەو دانەیە بەپێی ڕیزبەندی
        localStorage.setItem(`stock_${prodId}`, JSON.stringify(stock));
        showCurrentStock();
    }
</script>

</body>
</html>
