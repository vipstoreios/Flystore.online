<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | FLY MARKET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { padding: 30px 5%; }
        .admin-card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #1e293b; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        h2 { color: var(--blue); border-right: 4px solid var(--blue); padding-right: 15px; }
        .btn-action { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .btn-add { background: #10b981; color: white; }
        .btn-delete { background: #ef4444; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body>

<header class="header-bar">
    <div class="logo-small">FLY MARKET [ADMIN]</div>
    <a href="index.html" style="color: white; text-decoration: none;">چوونە دەرەوە</a>
</header>

<div class="admin-container">
    <h2>بەڕێوەبردنی بریکارەکان (Users)</h2>
    <div class="admin-card">
        <div class="admin-grid">
            <input type="text" id="newUsername" placeholder="ناوی بریکار">
            <input type="number" id="newBalance" placeholder="بڕی پارە (دینار)">
        </div>
        <button class="btn-action btn-add" style="margin-top: 15px; width: 100%;" onclick="addUser()">+ زیادکردنی بریکار</button>
    </div>

    <div class="admin-card">
        <table>
            <thead>
                <tr>
                    <th>ناوی بریکار</th>
                    <th>باڵانس</th>
                    <th>کردارەکان</th>
                </tr>
            </thead>
            <tbody id="userTable">
                <tr>
                    <td>shop1</td>
                    <td>50,000 IQD</td>
                    <td>
                        <button class="btn-action" style="background: var(--blue);" onclick="addMoney('shop1')">پارە زیاد بکە</button>
                        <button class="btn-action btn-delete" onclick="deleteUser(this)">سڕینەوە</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <hr style="border: 0.5px solid #1e293b; margin: 40px 0;">

    <h2>زیادکردنی بەرهەمی نوێ (Products)</h2>
    <div class="admin-card">
        <div class="admin-grid">
            <input type="text" id="prodName" placeholder="ناوی بەرهەم">
            <input type="text" id="prodPrice" placeholder="نرخ بە دینار">
            <input type="text" id="prodGuarantee" placeholder="گەرەنتی (بۆ نموونە: ١ مانگ)">
            <select id="prodStatus">
                <option value="active">یەکسەر ئەکتیڤ</option>
                <option value="delayed">دوای ٣ ڕۆژ</option>
            </select>
        </div>
        <button class="btn-action btn-add" style="margin-top: 15px; width: 100%;" onclick="addProduct()">بڵاوکردنەوەی بەرهەم</button>
    </div>
</div>

<script>
    // فەنکشن بۆ زیادکردنی بریکار
    function addUser() {
        const name = document.getElementById('newUsername').value;
        const balance = document.getElementById('newBalance').value;
        
        if(!name || !balance) return alert("تکایە هەموو خانەکان پڕ بکەرەوە");

        const table = document.getElementById('userTable');
        const row = `<tr>
            <td>${name}</td>
            <td>${parseInt(balance).toLocaleString()} IQD</td>
            <td>
                <button class="btn-action" style="background: var(--blue);" onclick="addMoney('${name}')">پارە زیاد بکە</button>
                <button class="btn-action btn-delete" onclick="deleteUser(this)">سڕینەوە</button>
            </td>
        </tr>`;
        table.innerHTML += row;
        alert("بریکار زیادکرا!");
    }

    // فەنکشن بۆ سڕینەوە
    function deleteUser(btn) {
        if(confirm("دڵنیای لە سڕینەوەی ئەم بریکارە؟")) {
            btn.parentElement.parentElement.remove();
        }
    }

    // فەنکشن بۆ پارە زیادکردن
    function addMoney(name) {
        let amount = prompt(`چەند پارە زیاد دەکەیت بۆ ${name}?`);
        if(amount) {
            alert(`بڕی ${amount} دینار بۆ ${name} زیادکرا!`);
        }
    }

    // فەنکشن بۆ زیادکردنی بەرهەم
    function addProduct() {
        const name = document.getElementById('prodName').value;
        const price = document.getElementById('prodPrice').value;
        if(!name || !price) return alert("زانیاری بەرهەم تەواو نییە");
        
        alert(`بەرهەمی ${name} بە سەرکەوتوویی بۆ سایتەکە زیادکرا و ئامادەیە بۆ فرۆشتن!`);
    }
</script>

</body>
</html>
