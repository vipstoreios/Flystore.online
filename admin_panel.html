<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fly Admin | Ultra Pro v5</title>
    <style>
        :root { --bg: #050810; --card: #111827; --accent: #0ea5e9; --danger: #ef4444; --success: #22c55e; --text: #f8fafc; --border: #1f2937; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; }
        .sidebar { width: 280px; background: var(--card); height: 100vh; position: fixed; border-left: 1px solid var(--border); padding: 20px; }
        .main { margin-right: 280px; padding: 30px; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-card h3 { color: var(--accent); margin: 0; font-size: 1.5rem; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 25px; }
        input, select, textarea { background: #050810; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; font-size: 0.8rem; }
        .scroll { max-height: 300px; overflow-y: auto; }
        .low-stock { border: 2px solid var(--danger) !important; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--accent)">FLY ULTRA</h2>
    <hr style="border:0.1px solid var(--border)">
    <button class="btn" style="width:100%; background:var(--border); color:white;" onclick="exportData()">📥 Export Excel (Backup)</button>
    <button class="btn" style="width:100%; background:var(--danger); color:white; margin-top:10px;" onclick="broadcastMsg()">📢 ناردنی نامەی گشتی</button>
    <div style="margin-top:20px; font-size:0.8rem; color:#64748b;">System Status: Active ✅</div>
</div>

<div class="main">
    <div class="stats-grid">
        <div class="stat-card"><p>کۆی فرۆشتن</p><h3 id="totalSales">0</h3></div>
        <div class="stat-card"><p>باڵانسی بریکاران</p><h3 id="totalUserBal">0</h3></div>
        <div class="stat-card"><p>کۆدی ماوە</p><h3 id="totalCodes">0</h3></div>
        <div class="stat-card"><p>بریکارەکان</p><h3 id="totalUsers">0</h3></div>
    </div>

    <div class="card">
        <h2>👤 بەڕێوەبردنی بریکارەکان</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr auto; gap:10px;">
            <input type="text" id="u_name" placeholder="Username">
            <input type="text" id="u_pass" placeholder="Password">
            <input type="number" id="u_bal" placeholder="Balance">
            <button class="btn btn-add" onclick="addUser()">تۆمارکردن</button>
        </div>
        <table style="width:100%; margin-top:15px;">
            <thead><tr><th>ناو</th><th>پاسورد</th><th>باڵانس</th><th>کردار</th></tr></thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
        <div class="card">
            <h2>🛍️ کاڵاکان</h2>
            <input type="text" id="p_name" placeholder="ناوی بەرهەم">
            <input type="number" id="p_price" placeholder="نرخ">
            <button class="btn btn-add" style="width:100%" onclick="addProduct()">زیادکردن</button>
            <div id="productList" class="scroll" style="margin-top:10px;"></div>
        </div>
        <div class="card">
            <h2>🔑 بارکردنی کۆد</h2>
            <select id="p_select" onchange="loadStock()"></select>
            <textarea id="bulk_codes" placeholder="کۆدەکان لێرە دانێ..."></textarea>
            <button class="btn btn-add" style="width:100%; background:var(--accent)" onclick="addCodes()">بارکردن</button>
            <div id="stockList" class="scroll" style="margin-top:10px;"></div>
        </div>
    </div>

    <div class="card">
        <h2>📊 مێژووی مامەڵەکان</h2>
        <table style="width:100%">
            <thead><tr><th>بریکار</th><th>کاڵا</th><th>کۆد</th><th>بەروار</th></tr></thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>
</div>

<script>
    window.onload = refresh;

    function refresh() {
        renderUsers(); renderProducts(); renderLogs(); updateStats();
    }

    function addUser() {
        const u = document.getElementById('u_name').value;
        const p = document.getElementById('u_pass').value;
        const b = document.getElementById('u_bal').value;
        if(!u || !p) return;
        localStorage.setItem(`acc_${u}`, JSON.stringify({pass:p, bal:parseInt(b), status:'active'}));
        refresh();
    }

    function renderUsers() {
        const tbody = document.getElementById('userTable');
        tbody.innerHTML = "";
        let totalBal = 0; let count = 0;
        for (let i=0; i<localStorage.length; i++) {
            let k = localStorage.key(i);
            if(k.startsWith('acc_')) {
                let d = JSON.parse(localStorage.getItem(k));
                let n = k.replace('acc_','');
                totalBal += d.bal; count++;
                tbody.innerHTML += `<tr><td>${n}</td><td>${d.pass}</td><td>${d.bal.toLocaleString()}</td>
                <td><button class="btn-del" onclick="delAcc('${k}')">سڕینەوە</button></td></tr>`;
            }
        }
        document.getElementById('totalUserBal').innerText = totalBal.toLocaleString();
        document.getElementById('totalUsers').innerText = count;
    }

    function addProduct() {
        const n = document.getElementById('p_name').value;
        const p = document.getElementById('p_price').value;
        if(!n || !p) return;
        let prods = JSON.parse(localStorage.getItem('prods') || "[]");
        let id = "ID"+Date.now();
        prods.push({id, n, p:parseInt(p)});
        localStorage.setItem('prods', JSON.stringify(prods));
        localStorage.setItem(`stk_${id}`, "[]");
        refresh();
    }

    function renderProducts() {
        const prods = JSON.parse(localStorage.getItem('prods') || "[]");
        const list = document.getElementById('productList');
        const select = document.getElementById('p_select');
        list.innerHTML = ""; select.innerHTML = "";
        let totalC = 0;
        prods.forEach(p => {
            let stk = JSON.parse(localStorage.getItem(`stk_${p.id}`) || "[]");
            totalC += stk.length;
            let isLow = stk.length < 5 ? 'low-stock' : '';
            list.innerHTML += `<div class="stat-card ${isLow}" style="margin-bottom:5px; display:flex; justify-content:space-between; align-items:center; padding:10px;">
                <span>${p.n} (${stk.length})</span>
                <button class="btn-del" onclick="delProd('${p.id}')">X</button>
            </div>`;
            select.innerHTML += `<option value="${p.id}">${p.n}</option>`;
        });
        document.getElementById('totalCodes').innerText = totalC;
    }

    function addCodes() {
        const id = document.getElementById('p_select').value;
        const raw = document.getElementById('bulk_codes').value.trim();
        if(!id || !raw) return;
        let newC = raw.split('\n').filter(x => x.trim() !== "");
        let old = JSON.parse(localStorage.getItem(`stk_${id}`) || "[]");
        localStorage.setItem(`stk_${id}`, JSON.stringify([...old, ...newC]));
        document.getElementById('bulk_codes').value = "";
        refresh();
        loadStock();
    }

    function loadStock() {
        const id = document.getElementById('p_select').value;
        const div = document.getElementById('stockList');
        let stk = JSON.parse(localStorage.getItem(`stk_${id}`) || "[]");
        div.innerHTML = stk.map((c, i) => `<div style="font-size:0.8rem; border-bottom:1px solid #1f2937; padding:5px; display:flex; justify-content:space-between;">${c} <button onclick="delCode('${id}',${i})" style="background:none; border:none; color:red; cursor:pointer;">X</button></div>`).join('');
    }

    function delCode(id, i) {
        let stk = JSON.parse(localStorage.getItem(`stk_${id}`));
        stk.splice(i, 1);
        localStorage.setItem(`stk_${id}`, JSON.stringify(stk));
        refresh(); loadStock();
    }

    function renderLogs() {
        const logs = JSON.parse(localStorage.getItem('logs') || "[]");
        document.getElementById('logTable').innerHTML = logs.reverse().map(l => `<tr><td>${l.u}</td><td>${l.p}</td><td>${l.c}</td><td>${l.d}</td></tr>`).join('');
        document.getElementById('totalSales').innerText = logs.length;
    }

    function broadcastMsg() {
        let m = prompt("نامەیەک بۆ هەموو بریکارەکان بنووسە:");
        if(m) localStorage.setItem('alert_msg', m);
    }

    function exportData() {
        let data = JSON.stringify(localStorage);
        let blob = new Blob([data], {type: "application/json"});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "fly_backup.json";
        a.click();
    }

    function delAcc(k) { if(confirm('دڵنیایت؟')) { localStorage.removeItem(k); refresh(); } }
    function delProd(id) { if(confirm('دڵنیایت؟')) { 
        let prods = JSON.parse(localStorage.getItem('prods'));
        prods = prods.filter(x => x.id !== id);
        localStorage.setItem('prods', JSON.stringify(prods));
        localStorage.removeItem(`stk_${id}`);
        refresh();
    } }
</script>
</body>
</html>
