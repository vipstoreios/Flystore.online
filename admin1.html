<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly Admin | Ultra</title>
    <style>
        :root { --bg: #050810; --card: #111827; --accent: #0ea5e9; --danger: #ef4444; --success: #22c55e; --text: #f8fafc; --border: #1f2937; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, select, textarea { background: #050810; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 16px; }
        .btn-add { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; padding: 5px; font-size: 12px; width: auto; }
        .scroll { max-height: 200px; overflow-y: auto; background: #050810; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <h2 style="text-align:center; color:var(--accent)">FLY ADMIN V5</h2>
    
    <div class="card">
        <h3>👤 زیادکردنی بریکار</h3>
        <input type="text" id="u_name" placeholder="Username" autocapitalize="none">
        <input type="text" id="u_pass" placeholder="Password">
        <input type="number" id="u_bal" placeholder="Balance">
        <button class="btn btn-add" onclick="addUser()">تۆمارکردن</button>
        <div id="userTable" class="scroll"></div>
    </div>

    <div class="card">
        <h3>🛍️ بەرهەم و کۆدەکان</h3>
        <input type="text" id="p_name" placeholder="ناوی بەرهەم">
        <input type="number" id="p_price" placeholder="نرخ">
        <button class="btn btn-add" style="background:var(--accent)" onclick="addProduct()">زیادکردنی بەرهەم</button>
        <select id="p_select" onchange="loadStock()"></select>
        <textarea id="bulk_codes" placeholder="کۆدەکان لێرە دانێ (هەر دێڕێک و کۆدێک)"></textarea>
        <button class="btn btn-add" onclick="addCodes()">بارکردنی کۆدەکان</button>
        <div id="stockList" class="scroll"></div>
    </div>

    <div class="card">
        <h3>📊 ڕاپۆرتی فرۆشتن</h3>
        <div id="logTable" class="scroll" style="max-height: 400px;"></div>
    </div>

<script>
    window.onload = refresh;
    function refresh() { renderUsers(); renderProducts(); renderLogs(); }

    function addUser() {
        const u = document.getElementById('u_name').value.trim().toLowerCase();
        const p = document.getElementById('u_pass').value.trim();
        const b = document.getElementById('u_bal').value;
        if(!u || !p) return;
        localStorage.setItem(`acc_${u}`, JSON.stringify({pass:p, bal:parseInt(b)}));
        refresh();
    }

    function renderUsers() {
        const div = document.getElementById('userTable'); div.innerHTML = "";
        for (let i=0; i<localStorage.length; i++) {
            let k = localStorage.key(i);
            if(k.startsWith('acc_')) {
                let d = JSON.parse(localStorage.getItem(k));
                div.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #1f2937;">
                <span>${k.replace('acc_','')} (${d.bal})</span>
                <button class="btn-del" onclick="localStorage.removeItem('${k}'); refresh();">X</button></div>`;
            }
        }
    }

    function addProduct() {
        const n = document.getElementById('p_name').value;
        const p = document.getElementById('p_price').value;
        if(!n || !p) return;
        let prods = JSON.parse(localStorage.getItem('prods') || "[]");
        let id = "ID"+Date.now();
        prods.push({id, n, p:parseInt(p)});
        localStorage.setItem('prods', JSON.stringify(prods));
        localStorage.setItem(`stk_${id}`, "[]");
        refresh();
    }

    function renderProducts() {
        const prods = JSON.parse(localStorage.getItem('prods') || "[]");
        const select = document.getElementById('p_select'); select.innerHTML = "";
        prods.forEach(p => { select.innerHTML += `<option value="${p.id}">${p.n}</option>`; });
    }

    function addCodes() {
        const id = document.getElementById('p_select').value;
        const raw = document.getElementById('bulk_codes').value;
        if(!id || !raw.trim()) return;
        let newC = raw.split('\n').map(x => x.trim()).filter(x => x.length > 0);
        let old = JSON.parse(localStorage.getItem(`stk_${id}`) || "[]");
        localStorage.setItem(`stk_${id}`, JSON.stringify([...old, ...newC]));
        document.getElementById('bulk_codes').value = "";
        alert("زیادکرا"); refresh(); loadStock();
    }

    function loadStock() {
        const id = document.getElementById('p_select').value;
        let stk = JSON.parse(localStorage.getItem(`stk_${id}`) || "[]");
        document.getElementById('stockList').innerHTML = stk.map((c, i) => `<div style="font-size:12px; padding:5px; border-bottom:1px solid #1f2937;">${c}</div>`).join('');
    }

    function renderLogs() {
        const logs = JSON.parse(localStorage.getItem('logs') || "[]");
        document.getElementById('logTable').innerHTML = logs.reverse().map(l => `<div style="font-size:11px; margin-bottom:10px; border-bottom:1px solid #1f2937;">${l.u} | ${l.p} | ${l.c}<br>${l.d}</div>`).join('');
    }
</script>
</body>
</html>
