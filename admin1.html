<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly Admin | Online Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #050810; --card: #111827; --accent: #0ea5e9; --danger: #ef4444; --border: #1f2937; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin:0; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        input, select, textarea { background: #050810; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 5px; }
        .btn-p { background: var(--accent); color: black; }
        .btn-d { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        #lock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
        hr { border: 0; border-top: 1px solid var(--border); margin: 15px 0; }
    </style>
</head>
<body>
<div id="lock"><div class="card"><h3>تێپەڕەوشەی ئەدمین</h3><input type="password" id="ap"><button class="btn btn-p" onclick="check()">چوونەژوورەوە</button></div></div>

<div id="cont" style="display:none;">
    <h2 style="text-align:center; color:var(--accent)">FLY ONLINE ADMIN</h2>
    
    <div class="card">
        <h3>📢 بڵاوکراوەی گشتی</h3>
        <input type="text" id="bm" placeholder="چی بنوسرێت؟">
        <button class="btn btn-p" onclick="db.ref('fly_alert').set(document.getElementById('bm').value)">ناردن</button>
        <button class="btn btn-d" onclick="db.ref('fly_alert').remove()">لابردنی ئاگاداری</button>
    </div>
    
    <div class="card">
        <h3>💳 بەکارهێنەران و باڵانس</h3>
        <label>هەڵبژاردنی یوزەر بۆ (باڵانس یان سڕینەوە):</label>
        <select id="bu"></select>
        <input type="number" id="ba" placeholder="بڕی پارە (بۆ نموونە: 5000)">
        <button class="btn btn-p" onclick="addB()">نوێکردنەوەی باڵانس</button>
        <button class="btn btn-d" onclick="delU()">⚠️ سڕینەوەی ئەم یوزەرە</button>
        <hr>
        <h4>دروستکردنی یوزەری نوێ</h4>
        <input type="text" id="un" placeholder="ناوی نوێ"><input type="text" id="up" placeholder="پاسۆرد">
        <button class="btn btn-p" onclick="addU()">تۆمارکردن</button>
    </div>

    <div class="card">
        <h3>🛍️ بەرهەمەکان</h3>
        <input type="text" id="pn" placeholder="ناوی بەرهەم">
        <input type="number" id="pp" placeholder="نرخ بە دینار">
        <button class="btn btn-p" onclick="addP()">زیادکردنی بەرهەم</button>
        <hr>
        <label>هەڵبژاردنی بەرهەم (بۆ کۆد یان سڕینەوە):</label>
        <select id="ps"></select>
        <button class="btn btn-d" style="margin-bottom:10px" onclick="delP()">⚠️ سڕینەوەی ئەم بەرهەمە</button>
        <textarea id="bc" rows="5" placeholder="کۆدەکان لێرە دابنێ (هەر یەکەی لە دێڕێک)"></textarea>
        <button class="btn btn-p" onclick="addC()">زیادکردنی کۆد</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBohQKrv5zn4N8-jvMI5lWJsKnbQ1AgBXw",
        authDomain: "flystoreon-f2abc.firebaseapp.com",
        projectId: "flystoreon-f2abc",
        databaseURL: "https://flystoreon-f2abc-default-rtdb.firebaseio.com",
        storageBucket: "flystoreon-f2abc.firebasestorage.app",
        messagingSenderId: "249136797109",
        appId: "1:249136797109:web:860229c474737fd3c5f5fc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function check() { if(document.getElementById('ap').value==="Ostaz.kim88"){ document.getElementById('lock').style.display='none'; document.getElementById('cont').style.display='block'; init(); } }

    function init() {
        db.ref('users').on('value', s => {
            let u = s.val() || {}; let sel = document.getElementById('bu'); sel.innerHTML = "";
            Object.keys(u).forEach(k => sel.innerHTML += `<option value="${k}">${k} (${u[k].bal} IQD)</option>`);
        });
        db.ref('products').on('value', s => {
            let p = s.val() || {}; let sel = document.getElementById('ps'); sel.innerHTML = "";
            Object.keys(p).forEach(k => sel.innerHTML += `<option value="${k}">${p[k].n}</option>`);
        });
    }

    // --- User Actions ---
    function addU() {
        let u = document.getElementById('un').value.trim().toLowerCase();
        let p = document.getElementById('up').value.trim();
        if(u && p) { db.ref('users/'+u).set({pass:p, bal:0}); alert("یوزەر دروستکرا"); }
    }

    function addB() {
        let u = document.getElementById('bu').value;
        let a = parseInt(document.getElementById('ba').value);
        if(!u || isNaN(a)) return;
        db.ref(`users/${u}/bal`).transaction(c => (c || 0) + a);
        alert("باڵانس گۆڕدرا");
    }

    function delU() {
        let u = document.getElementById('bu').value;
        if(u && confirm(`ئایا دڵنیایت لە سڕینەوەی یوزەری (${u})؟`)) {
            db.ref('users/' + u).remove();
        }
    }

    // --- Product Actions ---
    function addP() {
        let n = document.getElementById('pn').value; let p = document.getElementById('pp').value;
        if(n && p) { db.ref('products').push({n, p:parseInt(p)}); alert("بەرهەم زیادکرا"); }
    }

    function delP() {
        let id = document.getElementById('ps').value;
        if(id && confirm("ئایا دڵنیایت لە سڕینەوەی ئەم بەرهەمە؟")) {
            db.ref('products/' + id).remove();
        }
    }

    function addC() {
        let id = document.getElementById('ps').value;
        let codes = document.getElementById('bc').value.split('\n').filter(x => x.trim());
        if(!id || codes.length === 0) return;
        codes.forEach(c => db.ref(`products/${id}/stock`).push(c));
        document.getElementById('bc').value = "";
        alert("کۆدەکان زیادکران");
    }
</script>
</body>
</html>
